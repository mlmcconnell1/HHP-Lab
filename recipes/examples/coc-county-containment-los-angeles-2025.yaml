# Example recipe: counties substantially contained in the Los Angeles City & County CoC.
# Run preflight before build:
#   HHPLAB_NON_INTERACTIVE=1 hhplab build recipe-preflight --recipe recipes/examples/coc-county-containment-los-angeles-2025.yaml --json
# Expected containment output:
#   outputs/coc-county-containment-los-angeles-2025/containment__B2025xC2023__los-angeles-coc-county-candidates.parquet

version: 1
name: coc_county_containment_los_angeles_2025
description: >
  Build a containment list of 2023 county geometries whose area overlaps the
  Los Angeles City & County CoC above the configured threshold. The selector
  is the CoC ID CA-600.

universe:
  years: [2025]

targets:
  - id: los_angeles_coc_county_candidates
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [containment]
    containment_spec:
      container: { type: coc, vintage: 2025, source: hud_exchange }
      candidate: { type: county, vintage: 2023 }
      selector_ids: ["CA-600"]
      min_share: 0.50
      denominator: candidate_area
      method: planar_intersection

datasets: {}
transforms: []

pipelines:
  - id: build_los_angeles_coc_county_candidates
    target: los_angeles_coc_county_candidates
    steps: []
