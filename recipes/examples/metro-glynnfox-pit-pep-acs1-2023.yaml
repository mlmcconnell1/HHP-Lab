# Example recipe: one-year Glynn/Fox metro panel with metro-native ACS1.
# Builds PIT + county PEP + ACS1 unemployment for 2023.
# This is the identity-resample example for a metro-native dataset.

version: 1
name: metro_glynnfox_pit_pep_acs1_2023
description: >
  Build a one-year metro panel that combines PIT, PEP, and metro-native ACS1
  unemployment. This example shows the identity resample path for a
  metro-native dataset alongside crosswalk-based metro aggregation.

universe:
  years: [2023]

targets:
  - id: metro_panel
    geometry: { type: metro, source: glynn_fox_v1 }
    outputs: [panel]
    panel_policy:
      acs1:
        include: true

# Source datasets.
datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years:
      years: [2023]
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

  pep_county:
    provider: census
    product: pep
    version: 1
    native_geometry: { type: county, vintage: 2020 }
    years:
      years: [2023]
    year_column: year
    geo_column: county_fips
    params:
      series: postcensal
      vintage: 2024
    path: data/curated/pep/pep_county__v2024.parquet

  acs1_metro:
    provider: census
    product: acs1
    version: 1
    native_geometry: { type: metro, source: glynn_fox_v1 }
    years:
      years: [2023]
    year_column: acs1_vintage
    geo_column: metro_id
    path: data/curated/acs/acs1_metro__A2023@Dglynnfoxv1.parquet

transforms:
  - id: coc_to_metro
    type: crosswalk
    from: { type: coc, vintage: 2025, source: hud_exchange }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

  - id: county_to_metro_area
    type: crosswalk
    from: { type: county, vintage: 2020 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

# Pipeline: aggregate PIT and PEP, then join the metro-native ACS1 file directly.
pipelines:
  - id: build_metro_panel
    target: metro_panel
    steps:
      - materialize:
          transforms: [coc_to_metro, county_to_metro_area]

      - resample:
          dataset: pit
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: coc_to_metro
          measures: [pit_total, pit_sheltered, pit_unsheltered]
          aggregation: sum

      - resample:
          dataset: pep_county
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: county_to_metro_area
          measures: [population]
          aggregation: sum

      - resample:
          dataset: acs1_metro
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: identity
          measures:
            unemployment_rate_acs1: { aggregation: mean }

      - join:
          datasets: [pit, pep_county, acs1_metro]
          join_on: [geo_id, year]

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
