# Example recipe: full-feature Glynn/Fox metro panel.
# Builds PIT + county PEP + lagged ACS5 + January county ZORI for 2016-2024.
# This is the broadest metro example and exercises every major resampling path.

version: 1
name: metro_glynnfox_pit_acs_pep_zori_2016_2024
description: >
  Build a full-feature metro panel for the 25 Glynn/Fox metros. This example
  combines CoC-native PIT, county PEP population, tract-level ACS5 measures,
  and January county ZORI. It exercises metro transform materialization from
  CoC, county, and tract bases, plus lagged ACS file-set resolution.

universe:
  range: "2016-2024"

targets:
  - id: metro_panel
    geometry: { type: metro, source: glynn_fox_v1 }
    outputs: [panel]
    panel_policy:
      zori:
        min_coverage: 0.90

# Source datasets.
datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years: "2016-2024"
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

  pep_county:
    provider: census
    product: pep
    version: 1
    native_geometry: { type: county, vintage: 2020 }
    year_column: year
    geo_column: county_fips
    file_set:
      path_template: "data/curated/pep/pep_county__v{pep_vintage}.parquet"
      segments:
        - years: "2016-2020"
          geometry: { type: county, vintage: 2020 }
          constants: { pep_vintage: 2020 }
        - years: "2021-2024"
          geometry: { type: county, vintage: 2020 }
          constants: { pep_vintage: 2024 }

  acs_tract:
    provider: census
    product: acs5
    version: 1
    native_geometry: { type: tract }
    geo_column: tract_geoid
    file_set:
      path_template: "data/curated/acs/acs5_tracts__A{acs_end}xT{tract}.parquet"
      segments:
        - years: "2016-2020"
          geometry: { type: tract, vintage: 2010 }
          constants: { tract: 2010 }
          year_offsets: { acs_end: -1 }
        - years: "2021-2024"
          geometry: { type: tract, vintage: 2020 }
          constants: { tract: 2020 }
          year_offsets: { acs_end: -1 }

  zori_county:
    provider: zillow
    product: zori
    version: 1
    native_geometry: { type: county, vintage: 2020 }
    years: "2016-2024"
    year_column: year
    geo_column: geo_id
    params:
      align: point_in_time_jan
    path: data/curated/zori/zori__county__Z2026.parquet

filters:
  zori_county:
    type: temporal
    column: date
    method: point_in_time
    month: 1

# Metro transforms generated from CoC membership, county membership, and tract expansion.
transforms:
  - id: coc_to_metro
    type: crosswalk
    from: { type: coc, vintage: 2025, source: hud_exchange }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

  - id: county_to_metro_area
    type: crosswalk
    from: { type: county, vintage: 2020 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

  - id: county_to_metro_population
    type: crosswalk
    from: { type: county, vintage: 2020 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: population
        population_source: pep_county
        population_field: population

  - id: tract_to_metro_2010
    type: crosswalk
    from: { type: tract, vintage: 2010 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

  - id: tract_to_metro_2020
    type: crosswalk
    from: { type: tract, vintage: 2020 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

pipelines:
  - id: build_metro_panel
    target: metro_panel
    steps:
      - materialize:
          transforms:
            [coc_to_metro, county_to_metro_area, county_to_metro_population, tract_to_metro_2010, tract_to_metro_2020]

      - resample:
          dataset: pit
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: coc_to_metro
          measures: [pit_total, pit_sheltered, pit_unsheltered]
          aggregation: sum

      - resample:
          dataset: pep_county
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: county_to_metro_area
          measures: [population]
          aggregation: sum

      - resample:
          dataset: acs_tract
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: auto
          measures:
            total_population: { aggregation: sum }
            adult_population: { aggregation: sum }
            population_below_poverty: { aggregation: sum }
            median_household_income: { aggregation: weighted_mean }
            median_gross_rent: { aggregation: weighted_mean }

      - resample:
          dataset: zori_county
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: county_to_metro_population
          measures:
            zori: { aggregation: weighted_mean }

      - join:
          datasets: [pit, pep_county, acs_tract, zori_county]
          join_on: [geo_id, year]

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
