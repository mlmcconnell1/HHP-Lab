# Example recipe: national CoC PIT panel with lagged ACS density support.
# Builds PIT counts plus lagged ACS5 total population for 2015-2024.
# The recipe executor derives population_density_per_sq_km from total_population
# and the curated CoC boundary geometry for the target vintage.

version: 1
name: coc_pit_density_2015_2024
description: >
  Build a national CoC panel for 2015-2024 that includes CoC names, sheltered
  and unsheltered PIT counts, and CoC population density. PIT is read at CoC
  native geography, while lagged ACS5 tract total population is aggregated to
  the 2025 CoC boundary vintage and used to derive
  population_density_per_sq_km.

universe:
  range: "2015-2024"

targets:
  - id: coc_panel
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [panel]

datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years: "2015-2024"
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

  acs_tract:
    provider: census
    product: acs5
    version: 1
    native_geometry: { type: tract }
    geo_column: tract_geoid
    file_set:
      path_template: "data/curated/acs/acs5_tracts__A{acs_end}xT{tract}.parquet"
      segments:
        - years: "2015-2020"
          geometry: { type: tract, vintage: 2010 }
          constants: { tract: 2010 }
          year_offsets: { acs_end: -1 }
        - years: "2021-2024"
          geometry: { type: tract, vintage: 2020 }
          constants: { tract: 2020 }
          year_offsets: { acs_end: -1 }

transforms:
  - id: tract_to_coc_2010
    type: crosswalk
    from: { type: tract, vintage: 2010 }
    to: { type: coc, vintage: 2025, source: hud_exchange }
    spec:
      weighting:
        scheme: area

  - id: tract_to_coc_2020
    type: crosswalk
    from: { type: tract, vintage: 2020 }
    to: { type: coc, vintage: 2025, source: hud_exchange }
    spec:
      weighting:
        scheme: area

pipelines:
  - id: build_coc_panel
    target: coc_panel
    steps:
      - materialize:
          transforms: [tract_to_coc_2010, tract_to_coc_2020]

      - resample:
          dataset: pit
          to_geometry: { type: coc, vintage: 2025, source: hud_exchange }
          method: identity
          measures: [pit_total, pit_sheltered, pit_unsheltered]

      - resample:
          dataset: acs_tract
          to_geometry: { type: coc, vintage: 2025, source: hud_exchange }
          method: aggregate
          via: auto
          measures:
            total_population: { aggregation: sum }

      - join:
          datasets: [pit, acs_tract]
          join_on: [geo_id, year]

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
