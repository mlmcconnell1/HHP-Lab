version: 1
name: pennsylvania_cocs_counties_pittsburgh_msa_map_2025
description: >
  Render Pennsylvania county boundaries, all Pennsylvania CoC boundaries, and
  the Pittsburgh, PA Census MSA boundary as a single recipe-native HTML map
  artifact.

universe:
  years: [2025]

targets:
  - id: pennsylvania_overlay_map
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [map]
    map_spec:
      basemap: cartodbpositron
      viewport:
        fit_layers: true
        padding: 30
      layers:
        - geometry: { type: county, vintage: 2023, source: tiger_line }
          selector_ids:
            [
              "42001",
              "42003",
              "42005",
              "42007",
              "42009",
              "42011",
              "42013",
              "42015",
              "42017",
              "42019",
              "42021",
              "42023",
              "42025",
              "42027",
              "42029",
              "42031",
              "42033",
              "42035",
              "42037",
              "42039",
              "42041",
              "42043",
              "42045",
              "42047",
              "42049",
              "42051",
              "42053",
              "42055",
              "42057",
              "42059",
              "42061",
              "42063",
              "42065",
              "42067",
              "42069",
              "42071",
              "42073",
              "42075",
              "42077",
              "42079",
              "42081",
              "42083",
              "42085",
              "42087",
              "42089",
              "42091",
              "42093",
              "42095",
              "42097",
              "42099",
              "42101",
              "42103",
              "42105",
              "42107",
              "42109",
              "42111",
              "42113",
              "42115",
              "42117",
              "42119",
              "42121",
              "42123",
              "42125",
              "42127",
              "42129",
              "42131",
              "42133",
            ]
          label: Pennsylvania Counties
          tooltip_fields: [county_fips, geo_vintage, source]
          style:
            fill_color: "#f8f9fa"
            stroke_color: "#495057"
            fill_opacity: 0.04
            stroke_opacity: 0.75
            line_weight: 0.9
            z_order: 0
        - geometry: { type: coc, vintage: 2025, source: hud_exchange }
          selector_ids:
            [
              PA-500,
              PA-501,
              PA-502,
              PA-503,
              PA-504,
              PA-505,
              PA-506,
              PA-508,
              PA-509,
              PA-510,
              PA-511,
              PA-512,
              PA-600,
              PA-601,
              PA-603,
              PA-605,
            ]
          label: Pennsylvania CoCs
          tooltip_fields: [coc_id, coc_name, state_abbrev]
          style_mode: distinct
          style:
            fill_color: "#8ecae6"
            stroke_color: "#1d3557"
            fill_opacity: 0.24
            stroke_opacity: 0.9
            line_weight: 1.4
            z_order: 1
        - geometry: { type: msa, vintage: 2023, source: census_msa_2023 }
          selector_ids: ["38300"]
          label: Pittsburgh MSA
          tooltip_fields: [msa_id, msa_name, cbsa_code, definition_version]
          style:
            fill_color: "#ffb703"
            stroke_color: "#9b2226"
            fill_opacity: 0.12
            stroke_opacity: 1.0
            line_weight: 3.0
            z_order: 2

datasets: {}

pipelines:
  - id: pennsylvania_overlay_map_pipeline
    target: pennsylvania_overlay_map
    steps: []
