# New York MSA CoCs: PIT plus PEP tract-mediated population density.
#
# PIT vintage P2024 is the latest locally available HUD PIT vintage. A 2025
# ingest attempt did not produce a valid HUD workbook, so this recipe is
# intentionally limited to 2010-2024 for PIT-backed rows.

version: 1
name: new_york_msa_cocs_pit_pep_density_2010_2024
description: >
  Build a CoC panel for 2010-2024 with HUD PIT sheltered and unsheltered
  counts plus PEP county population allocated to 2025 CoC boundaries through
  tract-mediated decennial population weights. The containment output records
  CoCs fully within the New York-Newark-Jersey City, NY-NJ Census MSA
  (CBSA/MSA 35620) using 2025 CoC boundaries and Census MSA 2023 membership.

universe:
  range: "2010-2024"

targets:
  - id: nyc_msa_coc_panel
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [panel, containment]
    containment_spec:
      container: { type: msa, vintage: 2023, source: census_msa_2023 }
      candidate: { type: coc, vintage: 2025, source: hud_exchange }
      selector_ids: ["35620"]
      min_share: 0.999999
      denominator: candidate_area
      definition_version: census_msa_2023

datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years: "2010-2024"
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

  pep_county:
    provider: census
    product: pep
    version: 1
    native_geometry: { type: county, vintage: 2020 }
    year_column: year
    geo_column: county_fips
    file_set:
      path_template: "data/curated/pep/{pep_file}"
      segments:
        - years: "2010-2019"
          geometry: { type: county, vintage: 2020 }
          constants: { pep_file: "pep_county__v2020.parquet" }
        - years: "2020-2024"
          geometry: { type: county, vintage: 2020 }
          constants: { pep_file: "pep_county__v2025__y2020-2025.parquet" }

transforms:
  - id: county_to_coc_population
    type: crosswalk
    from: { type: county, vintage: 2020 }
    to: { type: coc, vintage: 2025, source: hud_exchange }
    spec:
      weighting:
        scheme: tract_mediated
        variety: population
        tract_vintage: 2020
        denominator_source: decennial
        denominator_vintage: 2020

pipelines:
  - id: build_nyc_msa_coc_panel
    target: nyc_msa_coc_panel
    steps:
      - materialize:
          transforms: [county_to_coc_population]

      - resample:
          dataset: pit
          to_geometry: { type: coc, vintage: 2025, source: hud_exchange }
          method: identity
          measures: [pit_total, pit_sheltered, pit_unsheltered]

      - resample:
          dataset: pep_county
          to_geometry: { type: coc, vintage: 2025, source: hud_exchange }
          method: aggregate
          via: county_to_coc_population
          measures: [population]
          aggregation: sum

      - join:
          datasets: [pit, pep_county]
          join_on: [geo_id, year]

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
