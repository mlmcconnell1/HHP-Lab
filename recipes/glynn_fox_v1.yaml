version: 1
name: coc_panel_2015_2024_zori
description: >
  Build a CoC-year panel for 2015–2024 suitable for a Glynn–Fox-style replication,
  using PIT totals, CoC population/income from ACS5 (tract→CoC), and ZORI (county→CoC).
  Produces both panel + diagnostics.

universe:
  range: "2015-2024"

targets:
  - id: coc_panel
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [panel, diagnostics]

datasets:
  # PIT at CoC level (already native to CoC)
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years: "2015-2024"
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

  # ACS5 tract-level measures used for CoC population + income (tract→CoC weighted aggregation)
  acs_tract:
    provider: census
    product: acs5
    version: 1
    native_geometry: { type: tract, vintage: 2020, source: tiger }
    years: "2015-2024"
    year_column: year
    geo_column: geo_id
    params:
      # Use whatever ACS vintage strategy you’ve standardized on in CoC-Lab;
      # this is just a declarative hint to the adapter.
      vintage: "2015-2024"
      measures: [total_population, median_household_income]
    path: data/curated/acs/acs5_tracts__A2024xT2020.parquet

  # ZORI at county level (county→CoC population-weighted aggregation)
  zori_county:
    provider: zillow
    product: zori
    version: 1
    native_geometry: { type: county }
    years: "2015-2024"
    year_column: year
    geo_column: county_fips
    params:
      align: point_in_time_jan
      # optional: any adapter-specific series selection / smoothing flags
      # series: "smoothed"  # example only
    path: data/curated/zori/zori__county__Z2026.parquet

transforms:
  # Population-weighted tract→CoC crosswalk (used to aggregate ACS to CoC)
  - id: tract_to_coc
    type: crosswalk
    from: { type: tract, vintage: 2020, source: tiger }
    to: { type: coc, vintage: 2025, source: hud_exchange }
    spec:
      weighting:
        scheme: population
        population_source: acs_tract
        population_field: total_population

  # Population-weighted county→CoC crosswalk (used to aggregate county ZORI to CoC)
  # (This assumes your runtime has an adapter that can build county↔CoC shares;
  # if not, you’ll need an intermediate county↔tract mapping + rollups.)
  - id: county_to_coc
    type: crosswalk
    from: { type: county, vintage: 2020 }
    to: { type: coc, vintage: 2025, source: hud_exchange }
    spec:
      weighting:
        scheme: population
        population_source: acs_tract
        population_field: total_population

pipelines:
  - id: build_coc_panel
    target: coc_panel
    steps:
      - materialize:
          transforms: [tract_to_coc, county_to_coc]

      # PIT is already CoC-native
      - resample:
          dataset: pit
          to_geometry: { type: coc, vintage: 2025, source: hud_exchange }
          method: identity
          measures: [pit_total, pit_sheltered, pit_unsheltered]

      # ACS tract → CoC (weighted aggregation, per-measure)
      - resample:
          dataset: acs_tract
          to_geometry: { type: coc, vintage: 2025, source: hud_exchange }
          method: aggregate
          via: tract_to_coc
          measures:
            total_population: { aggregation: sum }
            median_household_income: { aggregation: weighted_mean }

      # ZORI county → CoC (population-weighted aggregation)
      - resample:
          dataset: zori_county
          to_geometry: { type: coc, vintage: 2025, source: hud_exchange }
          method: aggregate
          via: county_to_coc
          measures: [zori]
          aggregation: weighted_mean

      # Join into a single CoC-year panel
      - join:
          datasets: [pit, acs_tract, zori_county]
          join_on: [geo_id, year]

filters:
  # ZORI is monthly; filter to January for point-in-time alignment with PIT counts
  zori_county:
    type: temporal
    column: month
    method: point_in_time
    month: 1

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
