version: 1
name: demo
universe:
  range: "2018-2024"

targets:
  - id: coc_panel
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [panel]

datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    params: { vintage: 2024, align: point_in_time_jan }

transforms: []

pipelines:
  - id: build_coc_panel
    target: coc_panel
    steps:
      - resample:
          dataset: pit
          to_geometry: { type: coc, vintage: 2025 }
          method: identity
          measures: [pit_total]
      - join:
          datasets: [pit]
          on: [geo_id, year]