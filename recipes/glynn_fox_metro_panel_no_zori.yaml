version: 1
name: glynn_fox_metro_panel_2011_2016_no_zori
description: >
  Build a metro-year panel for the 25 Glynn/Fox metros using metro-native
  recipe transforms. This matches the paper's full 2011-2016 analysis window
  for outcomes that only require PIT counts and total population. ZORI is
  intentionally excluded because the current curated Zillow artifact begins in
  January 2015 and cannot support the paper's 2011-2014 rent observations.

universe:
  range: "2011-2016"

targets:
  - id: metro_panel
    geometry: { type: metro, source: glynn_fox_v1 }
    outputs: [panel, diagnostics]

datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years: "2011-2016"
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

  pep_county:
    provider: census
    product: pep
    version: 1
    native_geometry: { type: county, vintage: 2020, source: tiger }
    years: "2011-2016"
    year_column: year
    geo_column: county_fips
    params:
      series: postcensal
      vintage: 2020
    path: data/curated/pep/pep_county__v2020__y2011-2016.parquet

transforms:
  - id: coc_to_metro
    type: crosswalk
    from: { type: coc, vintage: 2025, source: hud_exchange }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

  - id: county_to_metro
    type: crosswalk
    from: { type: county, vintage: 2020, source: tiger }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: population
        population_source: pep_county
        population_field: population

pipelines:
  - id: build_metro_panel
    target: metro_panel
    steps:
      - materialize:
          transforms: [coc_to_metro, county_to_metro]

      - resample:
          dataset: pit
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: coc_to_metro
          measures: [pit_total, pit_sheltered, pit_unsheltered]
          aggregation: sum

      - resample:
          dataset: pep_county
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: county_to_metro
          measures: [population]
          aggregation: sum

      - join:
          datasets: [pit, pep_county]
          join_on: [geo_id, year]

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
