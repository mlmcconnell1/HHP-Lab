version: 1
name: florida_cocs_orlando_msa_map_2025
description: >
  Render Florida county boundaries and all Florida CoC boundaries with the
  Orlando-Kissimmee-Sanford, FL Census MSA boundary overlaid as a single
  recipe-native HTML map artifact.

universe:
  years: [2025]

targets:
  - id: florida_overlay_map
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [map]
    map_spec:
      basemap: cartodbpositron
      viewport:
        fit_layers: true
        padding: 30
      layers:
        - geometry: { type: county, vintage: 2023, source: tiger_line }
          selector_ids:
            [
              "12001",
              "12003",
              "12005",
              "12007",
              "12009",
              "12011",
              "12013",
              "12015",
              "12017",
              "12019",
              "12021",
              "12023",
              "12027",
              "12029",
              "12031",
              "12033",
              "12035",
              "12037",
              "12039",
              "12041",
              "12043",
              "12045",
              "12047",
              "12049",
              "12051",
              "12053",
              "12055",
              "12057",
              "12059",
              "12061",
              "12063",
              "12065",
              "12067",
              "12069",
              "12071",
              "12073",
              "12075",
              "12077",
              "12079",
              "12081",
              "12083",
              "12085",
              "12086",
              "12087",
              "12089",
              "12091",
              "12093",
              "12095",
              "12097",
              "12099",
              "12101",
              "12103",
              "12105",
              "12107",
              "12109",
              "12111",
              "12113",
              "12115",
              "12117",
              "12119",
              "12121",
              "12123",
              "12125",
              "12127",
              "12129",
              "12131",
              "12133",
            ]
          label: Florida Counties
          tooltip_fields: [county_fips, geo_vintage, source]
          style:
            fill_color: "#f8f9fa"
            stroke_color: "#495057"
            fill_opacity: 0.04
            stroke_opacity: 0.75
            line_weight: 0.9
            z_order: 0
        - geometry: { type: coc, vintage: 2025, source: hud_exchange }
          selector_ids:
            [
              FL-500,
              FL-501,
              FL-502,
              FL-503,
              FL-504,
              FL-505,
              FL-506,
              FL-507,
              FL-508,
              FL-509,
              FL-510,
              FL-511,
              FL-512,
              FL-513,
              FL-514,
              FL-515,
              FL-517,
              FL-518,
              FL-519,
              FL-520,
              FL-600,
              FL-601,
              FL-602,
              FL-603,
              FL-604,
              FL-605,
              FL-606,
            ]
          label: Florida CoCs
          tooltip_fields: [coc_id, coc_name, state_abbrev]
          style_mode: distinct
          style:
            fill_color: "#8ecae6"
            stroke_color: "#1d3557"
            fill_opacity: 0.24
            stroke_opacity: 0.9
            line_weight: 1.4
            z_order: 0
        - geometry: { type: msa, vintage: 2023, source: census_msa_2023 }
          selector_ids: ["36740"]
          label: Orlando MSA
          tooltip_fields: [msa_id, msa_name, cbsa_code, definition_version]
          style:
            fill_color: "#ffb703"
            stroke_color: "#9b2226"
            fill_opacity: 0.12
            stroke_opacity: 1.0
            line_weight: 3.0
            z_order: 1

datasets: {}

pipelines:
  - id: florida_overlay_map_pipeline
    target: florida_overlay_map
    steps: []
