version: 1
name: california_cocs_counties_los_angeles_msa_map_2025
description: >
  Render California county boundaries, California CoC boundaries, and the
  Los Angeles-Long Beach-Anaheim, CA Census MSA boundary as a single
  recipe-native HTML map artifact.

universe:
  years: [2025]

targets:
  - id: california_overlay_map
    geometry: { type: coc, vintage: 2025, source: hud_exchange }
    outputs: [map]
    map_spec:
      basemap: cartodbpositron
      viewport:
        fit_layers: true
        padding: 30
      layers:
        - geometry: { type: county, vintage: 2023, source: tiger_line }
          selector_ids:
            [
              "06001",
              "06003",
