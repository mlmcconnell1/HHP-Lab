          label: California Counties
          tooltip_fields: [county_fips, geo_vintage, source]
          style:
            fill_color: "#f8f9fa"
            stroke_color: "#495057"
            fill_opacity: 0.04
            stroke_opacity: 0.75
            line_weight: 0.9
            z_order: 0
        - geometry: { type: coc, vintage: 2025, source: hud_exchange }
          selector_ids:
