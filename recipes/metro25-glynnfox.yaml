version: 1
name: glynn_fox_metro_panel_2015_2020_zori
description: >
  Build a metro-year panel for the 25 Glynn/Fox metros using metro-native
  recipe transforms. This follows the paper's analysis geography directly and
  uses PIT counts, county PEP population totals, and January county ZORI
  aggregated to the Glynn/Fox metro definition. PEP totals are interpolated to
  January to align with the PIT count timing, and the CoC crosswalk uses 2020
  boundaries to stay close to the 2015-2020 analysis window. ACS5 inputs stay
  source-faithful across the full panel: with the year-1 lag, every ACS
  vintage used here ends in 2014-2019 and is therefore aggregated from native
  2010-era tracts rather than translated to 2020 tracts first. The year range
  covers 2015-2020, starting when the curated ZORI artifact begins (January
  2015) and extending through 2020.

universe:
  range: "2015-2020"

targets:
  - id: metro_panel
    geometry: { type: metro, source: glynn_fox_v1 }
    outputs: [panel, diagnostics]
    panel_policy:
      column_aliases:
        total_population: total_population_acs5
        adult_population: adult_population_acs5
        population_below_poverty: population_below_poverty_acs5
        median_household_income: median_household_income_acs5
        median_gross_rent: median_gross_rent_acs5
        population: pep_population

datasets:
  pit:
    provider: hud
    product: pit
    version: 1
    native_geometry: { type: coc }
    years: "2015-2020"
    year_column: pit_year
    geo_column: coc_id
    params:
      vintage: 2024
      align: point_in_time_jan
    path: data/curated/pit/pit_vintage__P2024.parquet

  pep_county:
    provider: census
    product: pep
    version: 1
    native_geometry: { type: county, vintage: 2020, source: tiger }
    years: "2015-2020"
    year_column: year
    geo_column: county_fips
    params:
      series: postcensal
      vintage: 2020
      align: point_in_time_jan
    path: data/curated/pep/pep_county__v2020.parquet

  zori_county:
    provider: zillow
    product: zori
    version: 1
    native_geometry: { type: county, vintage: 2020, source: tiger }
    years: "2015-2020"
    year_column: year
    geo_column: geo_id
    params:
      align: point_in_time_jan
    path: data/curated/zori/zori__county__Z2026.parquet

  acs_tract:
    provider: census
    product: acs5
    version: 1
    native_geometry: { type: tract }
    geo_column: tract_geoid
    # Source-faithful tract policy:
    # PIT years 2015-2020 use lagged ACS vintages ending 2014-2019, all of
    # which are natively 2010-era tract data. Glynn/Fox metros are synthetic
    # county/CoC geographies, so we aggregate directly from T2010 here instead
    # of adding a 2010->2020 tract translation step.
    file_set:
      path_template: "data/curated/acs/acs5_tracts__A{acs_end}xT{tract}.parquet"
      segments:
        - years: "2015-2020"
          geometry: { type: tract, vintage: 2010 }
          constants: { tract: 2010 }
          year_offsets: { acs_end: -1 }

transforms:
  - id: coc_to_metro
    type: crosswalk
    from: { type: coc, vintage: 2020, source: hud_exchange }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

  - id: county_to_metro
    type: crosswalk
    from: { type: county, vintage: 2020, source: tiger }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: population
        population_source: pep_county
        population_field: population

  - id: tract_to_metro_2010
    type: crosswalk
    from: { type: tract, vintage: 2010 }
    to: { type: metro, source: glynn_fox_v1 }
    spec:
      weighting:
        scheme: area

pipelines:
  - id: build_metro_panel
    target: metro_panel
    steps:
      - materialize:
          transforms: [coc_to_metro, county_to_metro, tract_to_metro_2010]

      - resample:
          dataset: pit
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: coc_to_metro
          measures: [pit_total, pit_sheltered, pit_unsheltered]
          aggregation: sum

      - resample:
          dataset: pep_county
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: county_to_metro
          measures: [population]
          aggregation: sum

      - resample:
          dataset: acs_tract
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: auto
          measures:
            total_population: { aggregation: sum }
            adult_population: { aggregation: sum }
            population_below_poverty: { aggregation: sum }
            median_household_income: { aggregation: weighted_mean }
            median_gross_rent: { aggregation: weighted_mean }

      - resample:
          dataset: zori_county
          to_geometry: { type: metro, source: glynn_fox_v1 }
          method: aggregate
          via: county_to_metro
          measures: [zori]
          aggregation: weighted_mean

      - join:
          datasets: [pit, pep_county, acs_tract, zori_county]
          join_on: [geo_id, year]

filters:
  pep_county:
    type: temporal
    column: reference_date
    method: interpolate_to_month
    month: 1
  zori_county:
    type: temporal
    column: date
    method: point_in_time
    month: 1

validation:
  crosswalk_coverage:
    warn_below: 0.95
    fail_below: 0.90
  missing_dataset:
    default: fail
